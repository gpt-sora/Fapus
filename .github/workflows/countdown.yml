name: countdown

on:
  schedule:
    - cron: "7 * * * *" # hourly; GitHub may delay or skip runs under load
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update countdown
        run: python3 scripts/update_countdown.py
      - name: Commit if changed
        run: |
          git config user.name "fapus-countdown-bot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md assets/countdown.svg
          git diff --cached --quiet || git commit -m "tick: update countdown"
          git push
